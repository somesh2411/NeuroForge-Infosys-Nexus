server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: user-service-users
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**
        - id: user-service-teams
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/teams/**
        - id: project-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/projects/**, /api/v1/milestones/**
        - id: sprint-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/sprints/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200, http://127.0.0.1:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000/realms/neuroforge-realm
          jwk-set-uri: http://localhost:9000/realms/neuroforge-realm/protocol/openid-connect/certs

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.security: DEBUG
